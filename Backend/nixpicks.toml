[phases.setup]
nixPkgs = [
    "python3",
    "python3Packages.pip",
    "postgresql",
    "redis"  # if using Redis
]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[phases.build]
cmds = ["python manage.py collectstatic --noinput"]

[start]
cmd = "daphne -b 0.0.0.0 -p $PORT mysite.asgi:application"